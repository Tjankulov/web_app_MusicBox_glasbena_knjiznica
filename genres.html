<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>MusicBox Zvrsti</title>

  <!-- favicon -->
  <link rel="shortcut icon" type="image/png" href="img/favicon.ico">

  <!-- bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
    crossorigin="anonymous">

  <!-- axios -->
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

  <!-- vue -->
  <script type="module" src="js/genres.js"></script>
</head>

<!-- header -->
<body
  style="background-color:black;"
  class="d-flex flex-column min-vh-100">
  <!-- poveži z genres.js-->
  <div
    class="body-wrapper d-flex flex-column flex-grow-1"
    id="genres">
    <header>
      <nav
        class="navbar navbar-expand-lg sticky-top"
        style="background-color: rgb(240,240,81);">
        <div class="container">
          <a
            class="navbar-brand d-flex align-items-center"
            href="index.html"
            style="font-family: Lucida Sans, Geneva, Verdana, sans-serif;">
            <img
              src="img/logo.png"
              class="me-2"
              style="max-height:50px;">
            Music Box - glasbena knjižnica
          </a>
          <form action="musicians.html" method="GET" class="d-flex ms-auto">
              <input
                  name="genre"
                  class="form-control me-2"
                  type="search"
                  placeholder="🎧 Išči po zvrsti ...">
              <button class="btn btn-dark" type="submit">
                  Išči
              </button>
          </form>
        </div>
      </nav>
    </header>

    <!-- main -->
    <main class="container flex-grow-1">
      <div class="row">
        <div class="col-12 col-md-3">
          <!-- Meni seznamov -->
          <div class="list-group pt-4">
            <a
              href="musicians.html"
              class="list-group-item list-group-item-action"
              style="background-color:black;border-color:rgb(240,240,81);color:rgb(240,240,81);">
              Glasbeniki
            </a>
            <a
              href="genres.html"
              class="list-group-item list-group-item-action active"
              aria-current="true"
              style="background-color:rgb(240,240,81);border-color:black;color:black;">
              Zvrsti
            </a>
            <a
              href="albums.html"
              class="list-group-item list-group-item-action"
              style="background-color:black;border-color:rgb(240,240,81);color:rgb(240,240,81);">
              Albumi
            </a>
          </div>
          <img
            src="img/soundwaves.gif"
            class="img-fluid mt-4">
        </div>
        <!-- seznam glasbenikov -->
        <div class="col-12 col-md-9 pt-4">
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr>
                  <th
                    style="background-color:black;color:rgb(240,240,81)">
                    Zvrst
                  </th>
                  <th
                    style="background-color:black;color:rgb(240,240,81)">
                    Izbris
                  </th>
                  <th
                    style="background-color:black;color:rgb(240,240,81)">
                    Sprememba
                  </th>
                </tr>
              </thead>
              <tbody>
                <!-- zvrsti -->
                <tr
                  v-for="genre in genres"
                  :key="genre.id">
                  <td
                    style="background-color:black;color:rgb(240,240,81)">
                    {{genre.name}}
                  </td>
                  <td style="background-color:black">
                    <button
                      @click="deleteGenre(genre.id)"
                      type="button"
                      class="btn btn-sm btn-outline-light"
                      style="border-color:rgb(240,240,81);color:rgb(240,240,81)">
                      Izbriši
                    </button>
                  </td>
                  <td style="background-color:black">
                    <button
                      @click="populateForm(genre)"
                      type="button"
                      class="btn btn-sm btn-secondary"
                      style="border-color:rgb(240,240,81);color:rgb(240,240,81)">
                      Spremeni
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          <!-- dodajanje novega glasbenika -->
          <div class="pt-4">
            <h4
              style="color:rgb(240,240,81)">
              Dodaj Zvrst
            </h4>
            <form>
              <div class="mb-3">
                <label
                  for="genreName"
                  class="form-label"
                  style="color:rgb(240,240,81)">
                  Zvrst
                </label>
                <input
                  v-model="formGenre.name"
                  type="text"
                  class="form-control"
                  id="genreName"
                  style="background-color:rgb(240,240,81)">
                <div
                  id="nameHelp"
                  class="form-text">
                </div>
              </div>
            </form>
            <div class="d-flex gap-2 flex-wrap">
              <button
                @click="postGenre()"
                type="button"
                class="btn btn-outline-dark"
                style="background-color:yellow;">
                Shrani
              </button>
              <button
                @click="cleanForm()"
                type="button"
                class="btn btn-outline-light"
                style="border-color:rgb(240,240,81);color:rgb(240,240,81)">
                Počisti obrazec
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
    
    <!-- footer -->
    <footer class="mt-auto">
      <!-- Copyright -->
      <div
        class="text-center py-3 w-100"
        style="
        background-color:rgb(61,57,57);
        color:black;">
        © 2024 Copyright: PRA NOO - FIŠ NM
      </div>
    </footer>
  </div>

  <!-- bootstrap -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
    crossorigin="anonymous">
  </script>
</body>
</html>
