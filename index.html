<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Music box</title>

    <!-- favicon -->
    <link rel="shortcut icon" type="image/png" href="img/favicon.ico">

    <!-- axios -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <!-- vue -->
    <script type="module" src="js/home.js"></script>

    <!-- bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
        crossorigin="anonymous">
</head>

<!-- header -->
<body style="background-color:black;">
    <header>
        <nav
            class="navbar navbar-expand-lg sticky-top"
            style="background-color: rgb(240,240,81);">
            <div class="container-fluid">
                <a
                    class="navbar-brand d-flex align-items-center"
                    href="index.html"
                    style="font-family: Lucida Sans, Geneva, Verdana, sans-serif;">
                    <img
                        src="img/logo.png"
                        class="img-fluid me-2"
                        style="max-height:50px;">
                    Music Box - glasbena knjižnica
                </a>
                <!-- @submit.prevent prekine funkcijo search button in namesto tega izvede mojo funkcijo -->
                <form
                    action="musicians.html"
                    method="GET"
                    class="d-flex flex-wrap gap-2">
                    <input
                        name="genre"
                        class="form-control"
                        type="search"
                        placeholder="🎧 Išči po zvrsti ...">
                    <button
                        class="btn btn-dark"
                        type="submit">
                        Išči
                    </button>
                </form>
            </div>
        </nav>
    </header>

    <!-- main -->
    <main class="container-fluid py-4">
        <div class="row g-4">
            <div class="col-12 col-lg-3">

                <!-- Meni seznamov -->
                <div class="list-group">
                    <a
                        href="musicians.html"
                        class="list-group-item list-group-item-action"
                        style="background-color:black;border-color:rgb(240,240,81);color:rgb(240,240,81);">
                        Glasbeniki
                    </a>
                    <a
                        href="genres.html"
                        class="list-group-item list-group-item-action"
                        style="background-color:black;border-color:rgb(240,240,81);color:rgb(240,240,81);">
                        Zvrsti
                    </a>
                    <a
                        href="albums.html"
                        class="list-group-item list-group-item-action"
                        style="background-color:black;border-color:rgb(240,240,81);color:rgb(240,240,81);">
                        Albumi
                    </a>
                </div>
            </div>
            <div class="col-12 col-lg-9">
                <div class="text-center">
                    <a href="musicians.html">
                        <img
                            src="img/logo_big.png"
                            class="img-fluid"
                            alt="Music Box">
                    </a>
                </div>
            </div>
        </div>
    </main>
    
    <!-- footer -->
    <footer class="container-fluid mt-5">
        <!-- Copyright -->
        <div
            class="text-center p-3"
            style="background-color: rgb(61,57,57); color:black;">
            © 2024 Copyright: PRA NOO - FIŠ NM
        </div>
    </footer>

    <!-- bootstrap -->
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        crossorigin="anonymous"></script>
</body>
</html>
