<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MusicBox Albumi</title>
    <!-- favicon -->
    <link rel="shortcut icon" type="image/png" href="img/favicon.ico">
    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <!-- poppers -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <!-- axios -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <!-- vue -->
    <script type="module" src="js/albums.js"></script>
</head>

<!-- header -->

<body style="background-color: black">
    <!-- poveži z musicians.js-->
    <div class="body-wrapper" id="albums">
        <header>
            <nav class="navbar fixed-top" style="background-color: rgb(240, 240, 81);">
                <div class="container-fluid">
                    <a class="navbar-brand"
                        style="font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif"
                        href="index.html"><img src="img/logo.png" style="padding-right: 10px;">Music Box</a>
                </div>
            </nav>
        </header>

        <!-- main -->
        <main>
            <div class="container-fluid">
                <div class="row">
                    <div class="col-3">
                        <!-- Meni seznamov -->
                        <div class="list-group" style="padding-top: 100px;">
                            <a href="musicians.html" class="list-group-item list-group-item-action"
                                style="background-color: black; border-color: rgb(240, 240, 81); color:rgb(240, 240, 81);">
                                Glasbeniki
                            </a>
                            <a href="genres.html" class="list-group-item list-group-item-action"
                                style="background-color: black; border-color: rgb(240, 240, 81); color:rgb(240, 240, 81);">Zvrsti</a>
                            <a href="albums.html" class="list-group-item list-group-item-action active"
                                aria-current="true"
                                style="background-color: rgb(240, 240, 81); border-color: black; color: black;">Albumi</a>
                        </div>
                        <img src="img/soundwaves.gif" style="float:right;">
                    </div>
                    <!-- seznam glasbenikov -->
                    <div class="col-9" style="padding-top: 100px;">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th scope="col" style="background-color: black; color: rgb(240, 240, 81);">
                                        Album</th>
                                    <th scope="col" style="background-color: black; color: rgb(240, 240, 81);">Glasbenik
                                    </th>
                                    <th scope="col" style="background-color: black; color: rgb(240, 240, 81);">Zvrst
                                    </th>
                                    <th scope="col" style="background-color: black; color: rgb(240, 240, 81);">Izbris
                                    </th>
                                    <th scope="col" style="background-color: black; color: rgb(240, 240, 81);">Sprememba
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- glasbeniki -->
                                <tr v-for="album in albums" :key="album.id">
                                    <td style="background-color: black; color: rgb(240, 240, 81);">
                                        {{album.name}}</td>
                                    <td style="background-color: black; color: rgb(240, 240, 81);">
                                        {{album.musician.name}}
                                    </td>
                                    <td style="background-color: black; color: rgb(240, 240, 81);">
                                        {{album.genre.name}}
                                    </td>
                                    <td style="background-color: black;"><button @click="deleteAlbum(album.id)"
                                            type="button" class="btn btn-sm btn-outline-light"
                                            style="border-color: rgb(240, 240, 81); color:rgb(240, 240, 81);">Izbriši</button>
                                    </td>
                                    <td style="background-color: black;"><button @click="populateForm(album)"
                                            type="button" class="btn btn-sm btn-secondary"
                                            style="border-color: rgb(240, 240, 81); color:rgb(240, 240, 81);">Spremeni</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        <!-- dodajanje novega glasbenika -->
                        <div class="col-9" style="padding-top: 30px;">
                            <h4 style="color: rgb(240, 240, 81); padding-bottom: 20px;">Dodaj album</h4>
                            <form>
                                <div class="mb-3">
                                    <label for="albumName" class="form-label"
                                        style="color: rgb(240, 240, 81);">Album</label>
                                    <input v-model="formAlbum.name" type="text" class="form-control" id="albumName"
                                        aria-describedby="nameHelp" style="background-color: rgb(240, 240, 81);">
                                    <div id="nameHelp" class="form-text"></div>
                                </div>
                                <div class="mb-3">
                                    <label for="ZvrstSelect" class="form-label" style="color: rgb(240, 240, 81);">Zvrst
                                        <p style="font-size: small; margin-bottom: 0px;">(če zvrsti ni na seznamu, jo
                                            najprej dodaj v zavihku 'Zvrsti')</p>
                                    </label>
                                    <!-- povezava med vrednostjo spremenljivke v obrazcu in vrednostjo spremenljivke v vue kodi/ shrani se v pomnilniku računalnika pri vsakemu posebej -->
                                    <select v-model="formAlbum.genre" id="ZvrstSelect" class="form-select"
                                        style="background-color: rgb(240, 240, 81);">
                                        <option v-for="genre in genres" :value="genre" :key="genre.id">
                                            {{genre.name}}
                                        </option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label for="MusicianSelect" class="form-label" style="color: rgb(240, 240, 81);">Glasbenik
                                        <p style="font-size: small; margin-bottom: 0px;">(če glasbenika ni na seznamu, ga
                                            najprej dodaj v zavihku 'Glasbeniki')</p>
                                    </label>
                                    <!-- povezava med vrednostjo spremenljivke v obrazcu in vrednostjo spremenljivke v vue kodi/ shrani se v pomnilniku računalnika pri vsakemu posebej -->
                                    <select v-model="formAlbum.musician" id="MusicianSelect" class="form-select"
                                        style="background-color: rgb(240, 240, 81);">
                                        <option v-for="musician in musicians" :value="musician" :key="musician.id">
                                            {{musician.name}}
                                        </option>
                                    </select>
                                </div>
                            </form>
                            <button @click="postAlbum()" type="button" class="btn btn-outline-dark"
                                style="background-color: yellow; margin-top: 10px;">Shrani</button>
                            <button @click="cleanForm()" type="button" class="btn btn-outline-light"
                                style="border-color: rgb(240, 240, 81); color:rgb(240, 240, 81); margin-left: 10px; margin-top: 10px;">Počisti
                                obrazec</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- footer -->
        <footer class="container-fluid" style="margin-top: 400px;">
            <!-- Copyright -->
            <div class="text-center p-3" style="background-color: rgb(61, 57, 57); color: black;">© 2024 Copyright: PRA
                NOO - FIŠ NM
            </div>
        </footer>
        <!-- poppers -->
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
        <!-- bootstrap -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
            crossorigin="anonymous"></script>
    </div>
</body>

</html>
